<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121520" />
      <stop offset="100%" stop-color="#020305" />
    </linearGradient>
    <linearGradient id="grad-orange" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0a020" />
      <stop offset="100%" stop-color="#f5c256" />
    </linearGradient>
    <linearGradient id="grad-blue" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#4d96f0" />
      <stop offset="100%" stop-color="#6baaf5" />
    </linearGradient>
  </defs>

  <!-- Base App Rounded Square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <rect width="512" height="512" rx="112" fill="none" stroke="#181c28" stroke-width="12" />

  <!-- 3 Dynamic Progress Bars (Blue, Green, Orange) -->
  <g transform="translate(116, 136)">
    <!-- Bar 1: Blue -->
    <rect x="0" y="120" width="64" height="120" rx="32" fill="url(#grad-blue)" />
    
    <!-- Bar 2: Green -->
    <rect x="108" y="60" width="64" height="180" rx="32" fill="#26c485" />
    
    <!-- Bar 3: Orange -->
    <rect x="216" y="0" width="64" height="240" rx="32" fill="url(#grad-orange)" />
    
    <!-- Sweeping White Arrow Indicating Growth/Tracking -->
    <path d="M -20 180 C 80 180 150 50 310 -10" fill="none" stroke="#e2e6f0" stroke-width="28" stroke-linecap="round" />
    <path d="M 230 -10 L 310 -10 L 310 70" fill="none" stroke="#e2e6f0" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
